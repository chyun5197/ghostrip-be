spring:
  application:
    name: ghotsream

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        highlight_sql: true
        generate_statistics: false

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/ghostream?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:95206326}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    doc-expansion: none
    persist-authorization: true
    tags-sorter: alpha
